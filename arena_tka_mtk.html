<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TKA: Matematika</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: #2d3436; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .battle-arena { background: linear-gradient(to bottom, #0984e3, #00cec9); padding: 15px; border-bottom: 4px solid #fdcb6e; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 10; flex-shrink: 0; }
        .fighter { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .avatar { font-size: 35px; margin-bottom: 5px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; border: 2px solid #fff; }
        .hp-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #fff; }
        .hp-bar { height: 100%; transition: width 0.3s; }
        .player .hp-bar { background: #55efc4; width: 100%; }
        .monster .hp-bar { background: #d63031; width: 100%; }
        .name { font-family: 'Fredoka One', cursive; font-size: 14px; margin-top: 5px; text-align: center;}
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake { animation: shake 0.3s; background: #2d3436 !important; }
        .question-area { flex-grow: 1; overflow-y: auto; padding: 20px; background: #dfe6e9; color: #2d3436; position: relative; }
        .q-number { background: #0984e3; color: white; font-family: 'Fredoka One', cursive; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        .q-text { font-size: 20px; font-weight: 900; line-height: 1.5; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .opt-btn { background: white; border: 2px solid #b2bec3; border-radius: 12px; padding: 15px; text-align: left; font-size: 16px; font-family: 'Nunito', sans-serif; font-weight: 700; color: #2d3436; transition: 0.1s; display: flex; align-items: center; }
        .opt-btn.selected { border-color: #0984e3; background: #74b9ff; color: white; }
        .nav-area { background: white; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); display: flex; justify-content: space-between; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 10; flex-shrink: 0; }
        .nav-btn { background: #636e72; color: white; border: none; padding: 15px 10px; border-radius: 10px; font-family: 'Fredoka One', cursive; font-size: 16px; width: 48%; }
        .nav-btn.serang { background: #0984e3; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; text-align: center;}
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 20px; max-width: 400px; width: 100%; border: 5px solid #0984e3; }
        .modal-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: #0984e3; margin-bottom: 10px; }
        .modal-score { font-size: 60px; font-weight: 900; color: #00b894; margin: 10px 0; }
        .modal-btn { background: #0984e3; color: white; text-decoration: none; padding: 15px; border-radius: 10px; display: block; font-family: 'Fredoka One', cursive; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="battle-arena">
        <div class="fighter player">
            <div class="avatar">👨‍💻</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-player"></div></div>
            <div class="name">Ahli Hitung</div>
        </div>
        <div style="font-family:'Fredoka One'; font-size:20px; color:#fdcb6e;">VS</div>
        <div class="fighter monster">
            <div class="avatar">🔢</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-monster"></div></div>
            <div class="name">Siluman Angka</div>
        </div>
    </div>
    <div class="question-area" id="q-area">
        <div class="q-number" id="q-num">RUMUS 1 / 50</div>
        <div class="q-text" id="q-text">Loading problem...</div>
        <div class="options" id="options-box"></div>
    </div>
    <div class="nav-area">
        <button class="nav-btn" onclick="prevSoal()">⬅️ MUNDUR</button>
        <button class="nav-btn serang" id="btn-serang" onclick="serang()">JAWAB! 🧮</button>
    </div>
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <div class="modal-title" id="m-title">NUMERASI TUNTAS!</div>
            <div style="font-size: 50px;" id="m-icon">🎯</div>
            <div class="modal-score" id="m-score">100</div>
            <p id="m-desc" style="font-weight:700;">Logika matematikamu sangat tajam!</p>
            <a href="menu_tka.html" class="modal-btn">KEMBALI KE MENU 🗺️</a>
        </div>
    </div>
    <script>
        // Database 50 Soal MTK Kelas 6
        const db = [
            ["Hasil dari -15 + 25 adalah...","10","-10","40","-40",0],
            ["Hasil dari 12 - (-8) adalah...","4","-4","20","-20",2],
            ["Suhu udara di puncak gunung -4°C. Pada siang hari suhu naik 10°C. Suhu sekarang adalah...","14°C","6°C","-14°C","-6°C",1],
            ["Hasil dari -8 x (-7) adalah...","56","-56","15","-15",0],
            ["Hasil dari 72 : (-8) adalah...","9","-9","8","-8",1],
            ["Sebuah kapal selam berada 150 meter di bawah permukaan laut. Kemudian naik 40 meter. Posisi kapal selam sekarang adalah...","-110 meter","110 meter","-190 meter","190 meter",0],
            ["Hasil pengerjaan dari 20 + (-5) x 4 adalah...","0","-60","60","100",0],
            ["Garis yang menghubungkan titik pusat dengan titik pada lingkaran disebut...","Jari-jari (r)","Diameter (d)","Tali busur","Juring",0],
            ["Garis lurus yang menghubungkan dua titik pada lingkaran dan melalui titik pusat disebut...","Jari-jari","Tembereng","Diameter","Apotema",2],
            ["Rumus keliling lingkaran adalah...","π x r x r","π x d","2 x π x d","π x r",1],
            ["Sebuah lingkaran memiliki jari-jari 7 cm. Keliling lingkaran tersebut adalah... (π = 22/7)","22 cm","44 cm","154 cm","88 cm",1],
            ["Luas lingkaran yang memiliki diameter 14 cm adalah...","154 cm²","44 cm²","616 cm²","308 cm²",0],
            ["Rumus luas lingkaran adalah...","π x d","π x r²","2 x π x r","1/2 x a x t",1],
            ["Sebuah roda sepeda kelilingnya 132 cm. Jika π = 22/7, panjang jari-jari roda adalah...","14 cm","21 cm","28 cm","42 cm",1],
            ["Bangun ruang yang memiliki 6 sisi berbentuk persegi yang sama besar adalah...","Balok","Kubus","Prisma Segitiga","Limas",1],
            ["Rumus volume kubus adalah...","p x l x t","s x s x s","π x r² x t","1/3 x La x t",1],
            ["Volume kubus dengan panjang rusuk 8 cm adalah...","512 cm³","64 cm³","24 cm³","343 cm³",0],
            ["Sebuah balok memiliki panjang 10 cm, lebar 5 cm, dan tinggi 4 cm. Volumenya adalah...","200 cm³","100 cm³","50 cm³","400 cm³",0],
            ["Rumus luas permukaan balok adalah...","p x l x t","2 x (pl + pt + lt)","6 x s²","La x t",1],
            ["Bangun ruang yang tidak memiliki titik sudut adalah...","Kerucut","Tabung","Bola","Limas",2],
            ["Bangun ruang yang memiliki 1 rusuk melengkung dan 1 titik puncak adalah...","Tabung","Bola","Limas Segitiga","Kerucut",3],
            ["Rumus volume tabung adalah...","1/3 x π x r² x t","π x r² x t","p x l x t","4/3 x π x r³",1],
            ["Volume tabung dengan jari-jari alas 7 cm dan tinggi 10 cm adalah...","1.540 cm³","154 cm³","2.200 cm³","1.450 cm³",0],
            ["Banyaknya titik sudut pada balok adalah...","6","8","10","12",1],
            ["Banyaknya rusuk pada balok adalah...","8","10","12","6",2],
            ["Data tinggi badan (cm) 5 siswa: 130, 135, 140, 130, 145. Rata-rata tinggi badan mereka adalah...","130 cm","135 cm","136 cm","140 cm",2],
            ["Nilai ulangan matematika Budi: 7, 8, 8, 9, 7, 6, 8. Modus dari data tersebut adalah...","6","7","8","9",2],
            ["Nilai yang paling sering muncul dalam suatu kumpulan data disebut...","Mean","Median","Modus","Selisih",2],
            ["Nilai tengah dari suatu data yang telah diurutkan disebut...","Modus","Mean (Rata-rata)","Range","Median",3],
            ["Data nilai: 6, 7, 8, 9, 10. Median data tersebut adalah...","7","8","9","7.5",1],
            ["Bentuk persen dari pecahan 3/4 adalah...","25%","50%","75%","34%",2],
            ["Bentuk desimal dari 1/2 adalah...","0.1","0.2","0.5","0.12",2],
            ["Hasil dari 0.5 + 1.25 adalah...","1.30","1.75","2.75","0.75",1],
            ["Hasil dari 3/5 x 2/3 adalah...","6/15 (atau 2/5)","5/8","1/2","6/8",0],
            ["Ibu membeli mangga 2,5 kg dan apel 1,5 kg. Total berat belanjaan ibu adalah...","3 kg","3.5 kg","4 kg","4.5 kg",2],
            ["Jarak sebenarnya dua kota adalah 60 km. Jika digambar dengan skala 1 : 1.000.000, jarak pada peta adalah...","6 cm","60 cm","0.6 cm","600 cm",0],
            ["Perbandingan permen Andi dan Budi adalah 2 : 3. Jika jumlah permen mereka 20, banyak permen Budi adalah...","8","12","10","15",1],
            ["FPB dari 12 dan 18 adalah...","2","3","6","36",2],
            ["KPK dari 6 dan 8 adalah...","24","48","14","2",0],
            ["Lampu A menyala tiap 3 menit, lampu B tiap 4 menit. Mereka akan menyala bersama lagi tiap... menit.","7","12","24","1",1],
            ["Hasil dari 5² + 3² adalah...","16","34","64","15",1],
            ["Akar pangkat dua (√) dari 144 adalah...","10","11","12","14",2],
            ["Volume suatu bak air 1000 liter. Jika debit air 20 liter/menit, waktu untuk memenuhinya adalah...","5 menit","50 menit","20 menit","100 menit",1],
            ["Kecepatan mobil 60 km/jam. Waktu yang ditempuh 2 jam. Jaraknya adalah...","30 km","60 km","120 km","80 km",2],
            ["1 jam + 30 menit = ... detik.","3.600","1.800","5.400","90",2],
            ["1 abad = ... tahun.","10","100","1.000","10.000",1],
            ["Sebuah drum berbentuk tabung terisi penuh bensin. Jika jari-jarinya 7 dm dan tinggi 10 dm. Berapa liter isinya?","1.540 liter","154 liter","2.200 liter","1.400 liter",0],
            ["Dalam diagram lingkaran, sudut satu lingkaran penuh adalah...","90 derajat","180 derajat","270 derajat","360 derajat",3],
            ["Peluang munculnya angka pada pelemparan satu buah uang logam adalah...","1","1/2","1/4","1/6",1],
            ["Budi membeli sepatu seharga Rp 200.000 dengan diskon 20%. Harga yang harus dibayar Budi adalah...","Rp 40.000","Rp 160.000","Rp 180.000","Rp 220.000",1]
        ];
        let curr = 0, answers = new Array(50).fill(null), hpMonster = 100;
        const qNum = document.getElementById('q-num'), qText = document.getElementById('q-text');
        const optBox = document.getElementById('options-box'), btnSerang = document.getElementById('btn-serang');
        const barMonster = document.getElementById('hp-monster');
        function loadQ() {
            qNum.innerText = `RUMUS ${curr + 1} / 50`;
            qText.innerText = db[curr][0]; optBox.innerHTML = '';
            for(let i=1; i<=4; i++) {
                let btn = document.createElement('button'); btn.className = 'opt-btn';
                if(answers[curr] === i-1) btn.classList.add('selected');
                btn.innerText = String.fromCharCode(64+i) + ". " + db[curr][i];
                btn.onclick = () => { answers[curr] = i-1; loadQ(); }; optBox.appendChild(btn);
            }
            if(curr === 49) { btnSerang.innerText = "SELESAIKAN HITUNGAN! 🔒"; btnSerang.style.background = "#d63031"; } 
            else { btnSerang.innerText = "JAWAB! 🧮"; btnSerang.style.background = "#0984e3"; }
        }
        function prevSoal() { if(curr > 0) { curr--; loadQ(); } }
        function serang() {
            if(answers[curr] === null) { alert("Hitung dan pilih jawabanmu dulu!"); return; }
            if(answers[curr] === db[curr][5]) { hpMonster = Math.max(0, hpMonster - 2); barMonster.style.width = hpMonster + "%"; } 
            else { document.body.classList.add('shake'); setTimeout(() => document.body.classList.remove('shake'), 300); }
            if(curr < 49) { curr++; loadQ(); } else { tamat(); }
        }
        function tamat() {
            let skor = 0; answers.forEach((ans, i) => { if(ans === db[i][5]) skor += 2; });
            document.getElementById('m-score').innerText = skor;
            let t = document.getElementById('m-title'), d = document.getElementById('m-desc'), ic = document.getElementById('m-icon');
            if(skor >= 80) { t.innerText = "NUMERASI TUNTAS!"; t.style.color = "#00b894"; ic.innerText = "🎯"; d.innerText = "Logika matematikamu sangat tajam!"; } 
            else { t.innerText = "SALAH HITUNG"; t.style.color = "#d63031"; ic.innerText = "🔢"; d.innerText = "Banyak rumus yang terlupa. Mari berlatih lagi!"; document.getElementById('hp-player').style.width = "10%"; }
            document.getElementById('result-modal').style.display = "flex";
        }
        loadQ();
    </script>
</body>
</html>
