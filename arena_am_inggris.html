<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asesmen: B. Inggris</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: #0a3d62; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .battle-arena { background: linear-gradient(to bottom, #273c75, #192a56); padding: 15px; border-bottom: 4px solid #fbc531; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .fighter { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .avatar { font-size: 35px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; border: 2px solid #fff; }
        .hp-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 10px; margin-top: 5px; overflow: hidden; border: 1px solid #fff; }
        .hp-bar { height: 100%; transition: width 0.3s; }
        .player .hp-bar { background: #4cd137; width: 100%; }
        .monster .hp-bar { background: #e84118; width: 100%; }
        .name { font-family: 'Fredoka One', cursive; font-size: 14px; margin-top: 5px; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake { animation: shake 0.3s; background: #4a1c1c !important; }
        .question-area { flex-grow: 1; overflow-y: auto; padding: 20px; background: #f5f6fa; color: #2f3640; }
        .q-number { background: #192a56; color: white; font-family: 'Fredoka One', cursive; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        .q-text { font-size: 18px; font-weight: 900; line-height: 1.5; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .opt-btn { background: white; border: 2px solid #dcdde1; border-radius: 12px; padding: 15px; text-align: left; font-size: 16px; font-weight: 700; color: #2f3640; transition: 0.1s; }
        .opt-btn.selected { border-color: #192a56; background: #dff9fb; }
        .nav-area { background: white; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); display: flex; justify-content: space-between; border-top: 2px solid #eee; }
        .nav-btn { background: #718093; color: white; border: none; padding: 15px; border-radius: 10px; font-family: 'Fredoka One', cursive; width: 48%; }
        .nav-btn.serang { background: #192a56; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 5px solid #192a56; }
    </style>
</head>
<body>
    <div class="battle-arena">
        <div class="fighter player">
            <div class="avatar">💂‍♂️</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-player"></div></div>
            <div class="name">Smart Learner</div>
        </div>
        <div style="font-family:'Fredoka One'; color:#fbc531;">VS</div>
        <div class="fighter monster">
            <div class="avatar">👾</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-monster"></div></div>
            <div class="name">Confusion Monster</div>
        </div>
    </div>
    <div class="question-area" id="q-area">
        <div class="q-number" id="q-num">MISSION 1 / 50</div>
        <div class="q-text" id="q-text">Loading question...</div>
        <div class="options" id="options-box"></div>
    </div>
    <div class="nav-area">
        <button class="nav-btn" onclick="prevSoal()">⬅️ BACK</button>
        <button class="nav-btn serang" onclick="serang()">ANSWER! ✍️</button>
    </div>
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 style="font-family:'Fredoka One'; color:#192a56;">MISSION COMPLETE!</h2>
            <div style="font-size: 60px;">🥇</div>
            <div style="font-size: 50px; font-weight: 900; color: #44bd32;" id="m-score">0</div>
            <p id="m-desc" style="font-weight:700;"></p>
            <a href="menu_am.html" style="background:#192a56; color:white; text-decoration:none; padding:15px; display:block; border-radius:10px; font-family:'Fredoka One'; margin-top:20px;">BACK</a>
        </div>
    </div>
    <script>
        const db = [
            ["Teacher: Good morning, students! | Students: ...","Good afternoon","Good morning","Good evening","Good night",1],
            ["A person who teaches in the school is a...","Doctor","Farmer","Teacher","Pilot",2],
            ["We use our ... to see things.","Ears","Eyes","Nose","Mouth",1],
            ["My mother is cooking in the...","Bedroom","Living room","Bathroom","Kitchen",3],
            ["A: How many pens do you have? | B: I ... three pens.","Has","Have","Having","Had",1],
            ["The opposite of 'Big' is...","Long","Short","Small","Thin",2],
            ["I like to eat noodles. 'Makan' in English is...","Drink","Sleep","Eat","Run",2],
            ["A place to save our money is a...","Market","School","Bank","Cinema",2],
            ["What is the color of the Indonesian flag?","Red and Yellow","Blue and White","Red and White","Green and White",2],
            ["'Lurus terus' in English is...","Turn left","Turn right","Go straight","Go back",2],
            ["The doctor works in the...","Post office","Railway station","Hospital","Police station",2],
            ["Elephants are very ... (besar).","Small","Big","Tiny","Light",1],
            ["A: What time is it? | B: It is ... (07:00).","Seven o'clock","Eight o'clock","Nine o'clock","Six o'clock",0],
            ["We buy vegetables and fruits in the...","Library","Pharmacy","Bank","Traditional market",3],
            ["'Saya haus' in English is...","I am hungry","I am sleepy","I am thirsty","I am happy",2],
            ["She ... to school by bicycle every day.","Go","Goes","Going","Went",1],
            ["Yesterday, I ... a glass of milk.","Drink","Drank","Drinks","Drinking",1],
            ["The sun rises in the... (Timur)","North","South","East","West",2],
            ["'Sepuluh menit lagi jam sembilan' is...","Ten past nine","Ten to nine","Nine past ten","Nine to ten",1],
            ["A giraffe has a long ... (leher).","Ear","Neck","Tail","Trunk",1],
            ["We read books in the...","Gym","Canteen","Library","Yard",2],
            ["My father's brother is my...","Aunt","Cousin","Uncle","Nephew",2],
            ["'Expensive' means...","Murah","Mahal","Bagus","Jelek",1],
            ["Ice cream is ... (dingin).","Hot","Warm","Cold","Burning",2],
            ["A: May I borrow your ruler? | B: ...","No, thank you","Yes, of course","I'm sorry","Goodbye",1],
            ["What is the English word for 'Perpustakaan'?","Classroom","Office","Library","Laboratory",2],
            ["They ... soccer in the yard now.","Play","Plays","Are playing","Is playing",2],
            ["A lion is a ... animal. (buas)","Tame","Wild","Friendly","Cute",1],
            ["'Dua puluh lima' in English is...","Twelve","Twenty five","Fifteen","Fifty two",1],
            ["Which animal can produce milk for us?","Tiger","Snake","Cow","Cat",2],
            ["Indonesia has ... seasons. (dua)","Four","Three","Two","One",2],
            ["People use an ... when it is raining.","Hat","Umbrella","Shoes","Bag",1],
            ["'Jangan berisik!' in English is...","Don't cry!","Don't eat!","Don't be noisy!","Don't sleep!",2],
            ["I usually sleep in the...","Bedroom","Kitchen","Dining room","Garden",0],
            ["The train stops at the...","Airport","Railway station","Bus stop","Harbor",1],
            ["A person who flies a plane is a...","Driver","Pilot","Sailor","Mechanic",1],
            ["'Hobi saya berenang' in English is...","My hobby is running","My hobby is swimming","My hobby is reading","My hobby is drawing",1],
            ["Ten plus five is...","Fifteen","Fifty","Five","Twenty",0],
            ["'How are you today?' means...","Siapa namamu?","Di mana rumahmu?","Apa kabarmu?","Berapa usiamu?",2],
            ["We use ... to wash our hair.","Soap","Toothpaste","Shampoo","Detergent",2],
            ["An apple is a ... (buah).","Vegetable","Fruit","Food","Drink",1],
            ["The month after January is...","March","April","June","February",3],
            ["'Good bye' in Indonesian is...","Halo","Selamat datang","Selamat tinggal","Terima kasih",2],
            ["A kangaroo has a ... to carry its baby.","Bag","Box","Pouch","Pocket",2],
            ["'Sunday' in Indonesian is hari...","Senin","Selasa","Kamis","Minggu",3],
            ["I use my ... to listen to music.","Eyes","Ears","Nose","Legs",1],
            ["'Satu kilo apel harganya Rp 20.000.' In English is...","Twenty thousand rupiahs","Two thousand rupiahs","Two hundred rupiahs","Twelve thousand rupiahs",0],
            ["She is very ... she won the competition. (senang)","Sad","Angry","Happy","Sleepy",2],
            ["A: Thank you very much! | B: ...","Good morning","You are welcome","Goodbye","I am sorry",1],
            ["'Kapan kamu lahir?' In English is...","Where were you born?","When were you born?","Who are you?","How are you?",1]
        ];
        let curr = 0, userAns = new Array(50).fill(null), hpM = 100;
        function loadQ(){
            document.getElementById('q-num').innerText = `MISSION ${curr+1} / 50`;
            document.getElementById('q-text').innerText = db[curr][0];
            const box = document.getElementById('options-box'); box.innerHTML = '';
            for(let i=1;i<=4;i++){
                let b = document.createElement('button'); b.className = 'opt-btn';
                if(userAns[curr]===i-1) b.classList.add('selected');
                b.innerText = String.fromCharCode(64+i)+". "+db[curr][i];
                b.onclick = ()=>{ userAns[curr]=i-1; loadQ(); }; box.appendChild(b);
            }
        }
        function prevSoal(){ if(curr>0){ curr--; loadQ(); } }
        function serang(){
            if(userAns[curr]===null){ alert("Choose your answer first!"); return; }
            if(userAns[curr]===db[curr][5]){ hpM=Math.max(0,hpM-2); document.getElementById('hp-monster').style.width=hpM+"%"; }
            else { document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'),300); }
            if(curr<49){ curr++; loadQ(); } else { tamat(); }
        }
        function tamat(){
            let s = 0; userAns.forEach((a,i)=>{ if(a===db[i][5]) s+=2; });
            document.getElementById('m-score').innerText = s;
            document.getElementById('m-desc').innerText = s>=75?"Great! You are very smart in English.":"Keep practicing your vocabulary and grammar!";
            document.getElementById('result-modal').style.display="flex";
        }
        loadQ();
    </script>
</body>
</html>
