<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pertarungan: PJOK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: #006266; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .battle-arena { background: linear-gradient(to bottom, #10ac84, #01a3a4); padding: 15px; border-bottom: 4px solid #feca57; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 10; flex-shrink: 0; }
        .fighter { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .avatar { font-size: 35px; margin-bottom: 5px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; border: 2px solid #fff; }
        .hp-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #fff; }
        .hp-bar { height: 100%; transition: width 0.3s; }
        .player .hp-bar { background: #feca57; width: 100%; }
        .monster .hp-bar { background: #ee5253; width: 100%; }
        .name { font-family: 'Fredoka One', cursive; font-size: 14px; margin-top: 5px; text-align: center;}
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake { animation: shake 0.3s; background: #5f27cd !important; }
        .question-area { flex-grow: 1; overflow-y: auto; padding: 20px; background: #c8d6e5; color: #222f3e; position: relative; }
        .q-number { background: #10ac84; color: white; font-family: 'Fredoka One', cursive; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        .q-text { font-size: 20px; font-weight: 900; line-height: 1.5; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .opt-btn { background: white; border: 2px solid #8395a7; border-radius: 12px; padding: 15px; text-align: left; font-size: 16px; font-family: 'Nunito', sans-serif; font-weight: 700; color: #222f3e; transition: 0.1s; display: flex; align-items: center; }
        .opt-btn.selected { border-color: #10ac84; background: #1dd1a1; color: #fff; }
        .nav-area { background: white; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); display: flex; justify-content: space-between; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 10; flex-shrink: 0; }
        .nav-btn { background: #576574; color: white; border: none; padding: 15px 10px; border-radius: 10px; font-family: 'Fredoka One', cursive; font-size: 16px; width: 48%; }
        .nav-btn.serang { background: #10ac84; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; text-align: center;}
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 20px; max-width: 400px; width: 100%; border: 5px solid #10ac84; }
        .modal-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: #10ac84; margin-bottom: 10px; }
        .modal-score { font-size: 60px; font-weight: 900; color: #feca57; margin: 10px 0; }
        .modal-btn { background: #10ac84; color: white; text-decoration: none; padding: 15px; border-radius: 10px; display: block; font-family: 'Fredoka One', cursive; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="battle-arena">
        <div class="fighter player">
            <div class="avatar">🏃‍♂️</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-player"></div></div>
            <div class="name">Atlet Sekolah</div>
        </div>
        <div style="font-family:'Fredoka One'; font-size:20px; color:#fff;">VS</div>
        <div class="fighter monster">
            <div class="avatar">🦠</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-monster"></div></div>
            <div class="name">Monster Kuman</div>
        </div>
    </div>
    <div class="question-area" id="q-area">
        <div class="q-number" id="q-num">SOAL 1 / 50</div>
        <div class="q-text" id="q-text">Memuat pertanyaan...</div>
        <div class="options" id="options-box"></div>
    </div>
    <div class="nav-area">
        <button class="nav-btn" onclick="prevSoal()">⬅️ KEMBALI</button>
        <button class="nav-btn serang" id="btn-serang" onclick="serang()">SMASH! 🏸</button>
    </div>
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <div class="modal-title" id="m-title">SEHAT BUGAR!</div>
            <div style="font-size: 50px;" id="m-icon">🏅</div>
            <div class="modal-score" id="m-score">100</div>
            <p id="m-desc" style="font-weight:700;">Kamu menguasai materi PJOK dengan baik.</p>
            <a href="menu_pat.html" class="modal-btn">KEMBALI KE MENU 🗺️</a>
        </div>
    </div>
    <script>
        const db = [
            ["Senam lantai biasanya dilakukan di atas alas yang disebut...","Karpet","Matras","Kasur","Lantai semen",1],
            ["Tujuan utama menggunakan matras dalam senam lantai adalah...","Agar gaya lompatan tinggi","Menghindari cedera yang fatal","Supaya senam terlihat indah","Memudahkan gerakan lari",1],
            ["Gerakan menggulingkan badan ke depan membulat seperti roda disebut...","Roll belakang","Roll depan","Meroda","Lompat harimau",1],
            ["Sikap awal saat melakukan guling depan (roll depan) awalan jongkok adalah...","Berdiri tegak","Jongkok menghadap matras","Tidur telentang","Membungkuk",1],
            ["Bagian tubuh yang pertama kali menyentuh matras saat roll depan adalah...","Kepala bagian atas","Tengkuk (leher belakang)","Dahi","Punggung",1],
            ["Sikap lilin dilakukan dengan posisi badan...","Telentang dengan kedua kaki diangkat lurus ke atas","Tengkurap dengan kepala diangkat","Berdiri dengan satu kaki","Jongkok memeluk lutut",0],
            ["Gerakan meroda (cartwheel) mengandalkan tumpuan kekuatan pada...","Kedua kaki","Satu tangan","Kedua tangan (lengan)","Kepala",2],
            ["Kayang adalah posisi melentingkan badan ke belakang. Tujuan utamanya melatih kelenturan...","Kaki","Punggung / Otot perut","Leher","Tangan",1],
            ["Organisasi yang menaungi olahraga renang di Indonesia adalah...","PSSI","PBVSI","PRSI","PBSI",2],
            ["Gaya renang yang gerakannya menyerupai katak berenang adalah gaya...","Gaya bebas","Gaya dada (katak)","Gaya punggung","Gaya kupu-kupu",1],
            ["Sikap badan saat berenang gaya punggung adalah...","Telungkup / Tengkurap","Miring ke kanan","Telentang menghadap ke atas","Meringkuk",2],
            ["Pada renang gaya punggung, posisi wajah (hidung dan mulut) berada di...","Di bawah permukaan air","Tenggelam","Di atas permukaan air","Masuk air bergantian",2],
            ["Alat bantu yang aman digunakan pemula untuk belajar mengapung di kolam renang adalah...","Ban / Pelampung","Kacamata renang","Topi renang","Papan loncat",0],
            ["Sebelum melakukan olahraga renang, kita sangat diwajibkan untuk melakukan...","Pemanasan","Pendinginan","Makan kenyang","Berlari mengelilingi kolam",0],
            ["Fungsi utama kacamata renang adalah untuk mencegah mata dari iritasi akibat...","Air hujan","Kaporit / Klorin dalam air kolam","Cahaya matahari","Keringat",1],
            ["Posisi awal untuk meluncur pada renang gaya bebas adalah...","Berdiri membelakangi dinding kolam","Menempelkan satu telapak kaki ke dinding kolam","Berdiri di tepi kolam dan melompat","Jongkok di dasar kolam",1],
            ["Gaya renang yang tercepat dibandingkan gaya lainnya adalah...","Gaya punggung","Gaya kupu-kupu","Gaya dada","Gaya bebas (Crawl)",3],
            ["Kebersihan alat reproduksi sangat penting dijaga untuk mencegah...","Cepat tumbuh besar","Penyakit infeksi kulit dan jamur","Menjadi pintar","Gigi berlubang",1],
            ["Pakaian dalam harus diganti minimal...","Satu minggu sekali","Tiga hari sekali","Dua kali sehari sesudah mandi","Satu kali sehari",2],
            ["Bahan pakaian dalam yang paling baik untuk menyerap keringat adalah...","Nilon","Plastik","Sutra","Katun",3],
            ["Setelah buang air kecil (BAK) atau buang air besar (BAB), alat reproduksi harus dibilas menggunakan...","Air kotor","Tisu basah beralkohol","Air bersih yang mengalir","Kain kering saja",2],
            ["Mencuci tangan menggunakan sabun dan air mengalir adalah cara terbaik untuk mencegah penyakit...","Patah tulang","Diare dan infeksi kuman","Rabun mata","Diabetes",1],
            ["Penyakit demam berdarah dengue (DBD) ditularkan oleh...","Kucing peliharaan","Tikus kotor","Nyamuk Aedes Aegypti","Nyamuk Anopheles",2],
            ["Langkah 3M Plus untuk mencegah DBD adalah...","Menguras, Menutup, Mengubur","Memakai, Membuang, Menyimpan","Membakar, Menyapu, Membuang","Mencuci, Menjemur, Menyetrika",0],
            ["Penyakit menular yang menyerang organ paru-paru dan batuk berkepanjangan adalah...","TBC (Tuberkulosis)","Panu","Cacar Air","Demam Berdarah",0],
            ["Penyakit kulit menular yang ditandai dengan rasa gatal luar biasa terutama di sela-sela jari adalah...","Kudis (Skabies)","TBC","Malaria","Influenza",0],
            ["Salah satu penyakit yang tidak menular adalah...","Cacar Air","Asma / Jantung","TBC","Hepatitis",1],
            ["Penyakit Influenza (Flu) menular melalui...","Gigitan nyamuk","Makanan basi","Udara (percikan bersin/droplet)","Air sungai",2],
            ["Orang yang terkena penyakit cacar air sebaiknya...","Tidur bersama teman","Diisolasi agar tidak menularkan virus","Tetap masuk sekolah","Berenang di kolam umum",1],
            ["Vitamin yang sangat baik untuk menjaga daya tahan tubuh agar tidak mudah flu adalah...","Vitamin A","Vitamin C","Vitamin D","Vitamin K",1],
            ["Rabies adalah penyakit berbahaya yang dapat menular melalui gigitan hewan, contohnya...","Ayam","Burung pipit","Anjing dan Kera liar","Nyamuk",2],
            ["Narkoba adalah zat berbahaya yang singkatan dari...","Narkotika dan Obat-obatan Terlarang","Nutrisi dan Obat Batuk","Nanas dan Obat Ramuan","Narkotika dan Oksigen",0],
            ["Dampak buruk mengonsumsi narkoba bagi pelajar adalah...","Menjadi lebih cerdas","Kecanduan, merusak saraf, dan masa depan hancur","Badan menjadi kuat","Disukai guru",1],
            ["Rokok sangat berbahaya karena mengandung racun yang disebut...","Oksigen","Nikotin dan Tar","Vitamin","Kalsium",1],
            ["Penyakit yang paling sering ditimbulkan oleh kebiasaan merokok adalah...","Sakit perut","Kanker paru-paru","Cacar air","Tipes",1],
            ["Bila tubuh kita berkeringat setelah olahraga, sebaiknya kita...","Langsung mandi air es","Tidur di lantai","Beristirahat dan minum air putih agar suhu tubuh turun","Meminum kopi manis",2],
            ["Posisi awal melakukan gerakan *push up* bagi laki-laki adalah...","Telentang","Telungkup bertumpu pada ujung kaki dan telapak tangan","Duduk bersila","Berdiri tegak",1],
            ["Tujuan latihan *sit up* adalah untuk memperkuat otot...","Leher","Punggung","Perut","Kaki",2],
            ["Pemanasan sebelum olahraga bertujuan untuk...","Membuat tubuh cepat lelah","Menghindari cedera otot","Menambah berat badan","Mendinginkan suhu tubuh",1],
            ["Dalam lari jarak pendek (sprint), aba-aba awalan yang digunakan adalah...","Satu, dua, tiga, mulai","Bersedia, Siap, Ya!","Awas, Lari!","Maju jalan",1],
            ["Gerak melempar, menangkap, dan memukul bola terdapat pada permainan bola...","Basket","Voli","Kasti","Sepak Bola",2],
            ["Sepak bola adalah permainan beregu. Satu regu terdiri dari...","6 orang","11 orang","12 orang","5 orang",1],
            ["Pukulan keras dan menukik dalam permainan bola voli disebut...","Passing","Servis","Blocking","Smash",3],
            ["Dalam permainan bola basket, memasukkan bola ke dalam ring disebut...","Shooting","Dribbling","Passing","Heading",0],
            ["Induk organisasi pencak silat di Indonesia adalah...","PBVSI","IPSI","PSSI","PASI",1],
            ["Arah serangan yang paling sering dilakukan dalam pencak silat adalah pukulan lurus ke...","Bawah","Belakang","Depan","Atas",2],
            ["Senam kesegaran jasmani (SKJ) biasanya dilakukan dengan diiringi oleh...","Suara peluit saja","Musik dan hitungan","Suara teriakan","Hening",1],
            ["Daya tahan jantung dan paru-paru dapat dilatih dengan olahraga...","Catur","Angkat besi","Lari jarak jauh (Jogging)","Menembak",2],
            ["Kelenturan tubuh (fleksibilitas) sangat berguna agar otot kita...","Cepat kaku","Tidak kaku dan mudah bergerak (tidak mudah cedera)","Menjadi besar","Sulit digerakkan",1],
            ["Makanan sehat bergizi seimbang dikenal dengan istilah...","4 Sehat 5 Sempurna (Gizi Seimbang)","Junk Food","Fast Food","Makanan Instan",0]
        ];
        let curr = 0, answers = new Array(50).fill(null), hpMonster = 100;
        const qNum = document.getElementById('q-num'), qText = document.getElementById('q-text');
        const optBox = document.getElementById('options-box'), btnSerang = document.getElementById('btn-serang');
        const barMonster = document.getElementById('hp-monster');
        function loadQ() {
            qNum.innerText = `SOAL ${curr + 1} / 50`;
            qText.innerText = db[curr][0]; optBox.innerHTML = '';
            for(let i=1; i<=4; i++) {
                let btn = document.createElement('button'); btn.className = 'opt-btn';
                if(answers[curr] === i-1) btn.classList.add('selected');
                btn.innerText = String.fromCharCode(64+i) + ". " + db[curr][i];
                btn.onclick = () => { answers[curr] = i-1; loadQ(); }; optBox.appendChild(btn);
            }
            if(curr === 49) { btnSerang.innerText = "KUMPULKAN! 🔒"; btnSerang.style.background = "#e15f41"; } 
            else { btnSerang.innerText = "SMASH! 🏸"; btnSerang.style.background = "#10ac84"; }
        }
        function prevSoal() { if(curr > 0) { curr--; loadQ(); } }
        function serang() {
            if(answers[curr] === null) { alert("Pilih jawaban sebelum memukul, Atlet!"); return; }
            if(answers[curr] === db[curr][5]) { hpMonster = Math.max(0, hpMonster - 2); barMonster.style.width = hpMonster + "%"; } 
            else { document.body.classList.add('shake'); setTimeout(() => document.body.classList.remove('shake'), 300); }
            if(curr < 49) { curr++; loadQ(); } else { tamat(); }
        }
        function tamat() {
            let skor = 0; answers.forEach((ans, i) => { if(ans === db[i][5]) skor += 2; });
            document.getElementById('m-score').innerText = skor;
            let t = document.getElementById('m-title'), d = document.getElementById('m-desc'), ic = document.getElementById('m-icon');
            if(skor >= 80) { t.innerText = "SEHAT BUGAR!"; t.style.color = "#10ac84"; ic.innerText = "🏅"; d.innerText = "Kondisi fisik dan pengetahuanmu sempurna."; } 
            else { t.innerText = "KURANG FIT!"; t.style.color = "#e15f41"; ic.innerText = "🤕"; d.innerText = "Kamu masih sering kecolongan teori olahraga."; document.getElementById('hp-player').style.width = "10%"; }
            document.getElementById('result-modal').style.display = "flex";
        }
        loadQ();
    </script>
</body>
</html>
