<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asesmen: B. Indonesia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: #2c3e50; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .battle-arena { background: linear-gradient(to bottom, #c0392b, #8e44ad); padding: 15px; border-bottom: 4px solid #ecf0f1; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .fighter { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .avatar { font-size: 35px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; border: 2px solid #fff; }
        .hp-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 10px; margin-top: 5px; overflow: hidden; border: 1px solid #fff; }
        .hp-bar { height: 100%; transition: width 0.3s; }
        .player .hp-bar { background: #2ecc71; width: 100%; }
        .monster .hp-bar { background: #e67e22; width: 100%; }
        .name { font-family: 'Fredoka One', cursive; font-size: 14px; margin-top: 5px; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake { animation: shake 0.3s; background: #4a1c1c !important; }
        .question-area { flex-grow: 1; overflow-y: auto; padding: 20px; background: #fdfefe; color: #2c3e50; }
        .q-number { background: #c0392b; color: white; font-family: 'Fredoka One', cursive; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        .q-text { font-size: 18px; font-weight: 900; line-height: 1.5; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .opt-btn { background: white; border: 2px solid #bdc3c7; border-radius: 12px; padding: 15px; text-align: left; font-size: 16px; font-weight: 700; color: #2c3e50; transition: 0.1s; }
        .opt-btn.selected { border-color: #8e44ad; background: #e8daef; color: #4a235a;}
        .nav-area { background: white; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); display: flex; justify-content: space-between; border-top: 2px solid #eee; }
        .nav-btn { background: #7f8c8d; color: white; border: none; padding: 15px; border-radius: 10px; font-family: 'Fredoka One', cursive; width: 48%; }
        .nav-btn.serang { background: #8e44ad; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 5px solid #8e44ad; }
    </style>
</head>
<body>
    <div class="battle-arena">
        <div class="fighter player">
            <div class="avatar">👨‍🎓</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-player"></div></div>
            <div class="name">Ksatria Bahasa</div>
        </div>
        <div style="font-family:'Fredoka One'; color:#f1c40f;">VS</div>
        <div class="fighter monster">
            <div class="avatar">👾</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-monster"></div></div>
            <div class="name">Monster Typo</div>
        </div>
    </div>
    <div class="question-area" id="q-area">
        <div class="q-number" id="q-num">TEKS 1 / 50</div>
        <div class="q-text" id="q-text">Memuat pertanyaan...</div>
        <div class="options" id="options-box"></div>
    </div>
    <div class="nav-area">
        <button class="nav-btn" onclick="prevSoal()">⬅️ MUNDUR</button>
        <button class="nav-btn serang" onclick="serang()">JAWAB! 🖋️</button>
    </div>
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 style="font-family:'Fredoka One'; color:#8e44ad;">ASESMEN TUNTAS!</h2>
            <div style="font-size: 60px;">📚</div>
            <div style="font-size: 50px; font-weight: 900; color: #2ecc71;" id="m-score">0</div>
            <p id="m-desc" style="font-weight:700;"></p>
            <a href="menu_am.html" style="background:#8e44ad; color:white; text-decoration:none; padding:15px; display:block; border-radius:10px; font-family:'Fredoka One'; margin-top:20px;">KEMBALI</a>
        </div>
    </div>
    <script>
        const db = [
            ["Lembar isian yang berisi data diri seseorang untuk keperluan pendaftaran disebut...","Kuitansi","Formulir","Wesel pos","Buku harian",1],
            ["Hal yang wajib diisi dalam formulir pendaftaran sekolah adalah...","Nama hewan peliharaan","Makanan kesukaan","Nama lengkap, tempat tanggal lahir, alamat","Warna favorit",2],
            ["Daftar yang memuat catatan singkat tentang identitas diri, pendidikan, dan pengalaman seseorang disebut...","Daftar riwayat hidup (Curriculum Vitae)","Daftar menu","Daftar hadir","Kamus",0],
            ["Slip penyetoran uang biasanya kita temukan saat berada di...","Kantor polisi","Rumah sakit","Bank","Pasar",2],
            ["Wesel pos adalah formulir layanan untuk mengirimkan ... melalui kantor pos.","Barang/Paket","Uang","Surat","Makanan",1],
            ["Karangan yang berisi gagasan atau pendapat untuk meyakinkan pembaca disebut teks...","Deskripsi","Narasi","Persuasi","Eksplanasi",2],
            ["Teks yang menjelaskan proses terjadinya gerhana matahari disebut teks...","Eksplanasi ilmiah","Prosedur","Narasi","Argumentasi",0],
            ["Bagian awal dari teks eksplanasi yang berisi topik atau masalah yang akan dibahas disebut...","Deretan penjelas","Pernyataan umum / Pembuka","Interpretasi","Kesimpulan",1],
            ["Bagian teks eksplanasi yang berisi rincian sebab-akibat terjadinya suatu fenomena disebut...","Pernyataan umum","Interpretasi","Kesimpulan","Deretan penjelas",3],
            ["Pesan yang ingin disampaikan oleh pembuat iklan/reklame disebut...","Amanat iklan","Judul iklan","Informasi / Pesan persuasif","Desain",2],
            ["Surat undangan resmi biasanya dikeluarkan oleh...","Teman sebaya","Keluarga","Instansi / Lembaga resmi","Anak sekolah",2],
            ["Bagian yang hanya ada pada surat resmi tetapi tidak ada pada surat pribadi adalah...","Tanggal surat","Salam penutup","Kop surat dan Nomor surat","Nama pengirim",2],
            ["Contoh salam pembuka pada surat resmi yang paling tepat adalah...","Hai, apa kabar?","Dengan hormat,","Halo teman-teman,","Salam rindu,",1],
            ["Penulisan tempat dan tanggal pembuatan surat yang benar adalah...","mojokerto 12 mei 2026","Mojokerto, 12 Mei 2026","Mojokerto: 12 mei 2026","Mojokerto. 12 Mei 2026",1],
            ["Puisi lama yang setiap baitnya terdiri dari 4 baris dan bersajak a-b-a-b adalah...","Gurindam","Karmina","Pantun","Syair",2],
            ["Baris ke-1 dan ke-2 pada pantun berfungsi sebagai...","Isi","Tema","Sampiran","Amanat",2],
            ["Baris ke-3 dan ke-4 pada pantun merupakan...","Sampiran","Isi atau Maksud","Judul","Rima",1],
            ["Sajak atau rima akhir pada sebuah syair selalu berbunyi...","a-b-a-b","a-b-b-a","a-a-a-a","a-a-b-b",2],
            ["Pidato yang dilakukan secara langsung tanpa persiapan naskah sama sekali disebut metode...","Ekstemporan","Hafalan","Naskah","Impromptu (Serta merta)",3],
            ["Membaca teks pidato yang sudah dipersiapkan dari awal sampai akhir disebut metode...","Naskah","Hafalan","Impromptu","Ekstemporan",0],
            ["Orang yang ahli dalam berpidato disebut...","Koreografer","Orator","Kolektor","Sutradara",1],
            ["Ucapan 'Puji syukur kita panjatkan kehadirat Tuhan YME' dalam pidato termasuk bagian...","Pendahuluan / Pembuka","Isi pidato","Penutup","Salam penutup",0],
            ["Laporan hasil pengamatan harus ditulis berdasarkan...","Imajinasi/Karangan","Fakta dan data yang sebenarnya","Dongeng","Mimpi",1],
            ["Hal pertama yang harus ditentukan sebelum menulis karangan adalah...","Judul","Kerangka karangan","Tema","Kesimpulan",2],
            ["Kata tanya yang digunakan untuk menanyakan alasan atau sebab adalah...","Kapan","Bagaimana","Di mana","Mengapa",3],
            ["Untuk mengetahui cara membuat kue bolu, kita menggunakan kata tanya...","Apa","Siapa","Mengapa","Bagaimana",3],
            ["Membaca sekilas untuk mengetahui inti dari sebuah bacaan disebut membaca...","Memindai (Scanning)","Skimming","Ekstensif","Nyaring",1],
            ["Tokoh yang memerankan sifat baik dalam sebuah cerita fiksi disebut tokoh...","Antagonis","Protagonis","Tritagonis","Figuran",1],
            ["Sifat atau watak yang dimiliki oleh tokoh cerita disebut...","Alur","Latar","Penokohan / Karakter","Amanat",2],
            ["Tempat, waktu, dan suasana terjadinya suatu cerita disebut...","Tema","Alur","Latar / Setting","Amanat",2],
            ["Dongeng tentang asal-usul terjadinya Gunung Tangkuban Perahu termasuk jenis...","Fabel","Legenda","Mite","Sage",1],
            ["Cerita fiksi tentang Kancil dan Buaya termasuk jenis cerita...","Fabel","Mite","Sage","Legenda",0],
            ["Antonim dari kata 'Pemberani' adalah...","Pahlawan","Penakut","Kuat","Hebat",1],
            ["Sinonim dari kata 'Pakar' adalah...","Amatir","Pemula","Ahli","Siswa",2],
            ["'Doni besar kepala karena memenangkan lomba itu.' Arti ungkapan besar kepala adalah...","Kepalanya membesar","Sombong","Pintar","Sakit kepala",1],
            ["Peribahasa 'Besar pasak daripada tiang' artinya...","Suka menabung","Lebih besar pengeluaran daripada pendapatan","Bekerja keras siang malam","Tidak tahu balas budi",1],
            ["'Air beriak tanda tak dalam.' Makna peribahasa tersebut adalah...","Orang yang banyak bicara biasanya kurang ilmunya","Orang pintar selalu diam","Orang yang pandai berenang","Sungai yang dangkal berbahaya",0],
            ["Penulisan kata baku yang benar di bawah ini adalah...","Apotik","Nasehat","Ijazah","Jadual",2],
            ["Kata baku dari kata 'aktifitas' adalah...","Aktivitas","Aktipitas","Akhtivitas","Actifitas",0],
            ["'Ayah sedang membaca (koran).' Kata dalam kurung menduduki fungsi sebagai...","Subjek","Predikat","Objek","Keterangan",2],
            ["Imbuhan 'me-' bertemu dengan kata dasar 'pesona' akan menjadi...","Mepesona","Mempesona","Memesona","Menpesona",2],
            ["Kata dasar dari kata 'mempertahankan' adalah...","Tahan","Pertahan","Tahanan","Mempertahan",0],
            ["Gagasan pokok pada sebuah paragraf dapat ditemukan di dalam...","Kalimat penjelas","Kalimat utama","Judul teks","Penutup",1],
            ["Teks yang menceritakan urutan langkah-langkah membuat kerajinan tangan disebut teks...","Prosedur","Narasi","Deskripsi","Argumentasi",0],
            ["Penggunaan tanda seru (!) yang tepat terdapat pada kalimat...","Tolong ambilkan buku itu!","Kapan ayah pulang!","Ayah membaca koran!","Budi membeli apel!",0],
            ["Kalimat langsung biasanya ditandai dengan penggunaan tanda baca...","Koma (,)","Titik dua (:)","Tanda petik ganda (\"...\")","Tanda kurung ()",2],
            ["'Kemarin, Pak Budi pergi ke surabaya.' Kesalahan ejaan pada kalimat tersebut adalah...","Kata 'Kemarin' seharusnya huruf kecil","Kata 'surabaya' seharusnya huruf kapital (Surabaya)","Kata 'Pak' seharusnya huruf kecil","Tidak perlu tanda titik",1],
            ["Buku yang menceritakan riwayat hidup tokoh pahlawan disebut buku...","Novel","Komik","Biografi","Kamus",2],
            ["Singkatan dari Perseroan Terbatas yang benar penulisannya adalah...","PT.","PT","P.T.","P.T",1],
            ["Karangan yang berisi pengalaman pribadi penulis disebut karangan...","Fiksi","Autobiografi","Legenda","Fabel",1]
        ];
        let curr = 0, userAns = new Array(50).fill(null), hpM = 100;
        function loadQ(){
            document.getElementById('q-num').innerText = `TEKS ${curr+1} / 50`;
            document.getElementById('q-text').innerText = db[curr][0];
            const box = document.getElementById('options-box'); box.innerHTML = '';
            for(let i=1;i<=4;i++){
                let b = document.createElement('button'); b.className = 'opt-btn';
                if(userAns[curr]===i-1) b.classList.add('selected');
                b.innerText = String.fromCharCode(64+i)+". "+db[curr][i];
                b.onclick = ()=>{ userAns[curr]=i-1; loadQ(); }; box.appendChild(b);
            }
        }
        function prevSoal(){ if(curr>0){ curr--; loadQ(); } }
        function serang(){
            if(userAns[curr]===null){ alert("Pilih jawabanmu, Ksatria!"); return; }
            if(userAns[curr]===db[curr][5]){ hpM=Math.max(0,hpM-2); document.getElementById('hp-monster').style.width=hpM+"%"; }
            else { document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'),300); }
            if(curr<49){ curr++; loadQ(); } else { tamat(); }
        }
        function tamat(){
            let s = 0; userAns.forEach((a,i)=>{ if(a===db[i][5]) s+=2; });
            document.getElementById('m-score').innerText = s;
            document.getElementById('m-desc').innerText = s>=75?"Mantap! Tata bahasamu sangat akurat dan teliti.":"Ada beberapa kesalahan. Mari rajin membaca lagi!";
            document.getElementById('result-modal').style.display="flex";
        }
        loadQ();
    </script>
</body>
</html>
