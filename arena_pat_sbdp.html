<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pertarungan: SBdP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: #2c3e50; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER (Warna Seni - Ungu/Pink) */
        .battle-arena { background: linear-gradient(to bottom, #8e44ad, #5b2c6f); padding: 15px; border-bottom: 4px solid #ff9ff3; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 10; flex-shrink: 0; }
        .fighter { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .avatar { font-size: 35px; margin-bottom: 5px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50%; border: 2px solid #fff; }
        .hp-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #fff; }
        .hp-bar { height: 100%; transition: width 0.3s, background 0.3s; }
        .player .hp-bar { background: #2ecc71; width: 100%; }
        .monster .hp-bar { background: #e74c3c; width: 100%; }
        .name { font-family: 'Fredoka One', cursive; font-size: 14px; margin-top: 5px; text-align: center; color: #ff9ff3;}
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake { animation: shake 0.3s ease-in-out; background: #512e5f !important; }

        /* AREA SOAL */
        .question-area { flex-grow: 1; overflow-y: auto; padding: 20px; background: #fdfefe; color: #2c3e50; position: relative; }
        .q-number { background: #9b59b6; color: white; font-family: 'Fredoka One', cursive; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        .q-text { font-size: 20px; font-weight: 900; line-height: 1.5; margin-bottom: 20px; }
        
        .options { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .opt-btn { background: white; border: 2px solid #d7bde2; border-radius: 12px; padding: 15px; text-align: left; font-size: 16px; font-family: 'Nunito', sans-serif; font-weight: 700; color: #5b2c6f; transition: 0.1s; display: flex; align-items: center; }
        .opt-btn:active { transform: scale(0.98); background: #f4ecf7; }
        .opt-btn.selected { border-color: #8e44ad; background: #9b59b6; color: white; }
        
        /* NAVIGASI BAWAH */
        .nav-area { background: white; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); display: flex; justify-content: space-between; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 10; flex-shrink: 0; }
        .nav-btn { background: #95a5a6; color: white; border: none; padding: 15px 10px; border-radius: 10px; font-family: 'Fredoka One', cursive; font-size: 16px; width: 48%; transition: 0.2s; display: flex; justify-content: center; align-items: center;}
        .nav-btn:active { transform: translateY(2px); }
        .nav-btn.serang { background: #8e44ad; }
        
        /* MODAL */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; text-align: center;}
        .modal-content { background: white; color: #333; padding: 30px; border-radius: 20px; max-width: 400px; width: 100%; }
        .modal-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: #8e44ad; margin-bottom: 10px; }
        .modal-score { font-size: 60px; font-weight: 900; color: #f39c12; margin: 10px 0; }
        .modal-btn { background: #8e44ad; color: white; text-decoration: none; padding: 15px; border-radius: 10px; display: block; font-family: 'Fredoka One', cursive; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="battle-arena">
        <div class="fighter player">
            <div class="avatar">🎨</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-player"></div></div>
            <div class="name">Seniman Cilik</div>
        </div>
        <div style="font-family:'Fredoka One'; font-size:20px; color:#ff9ff3;">VS</div>
        <div class="fighter monster">
            <div class="avatar">🗿</div>
            <div class="hp-bar-bg"><div class="hp-bar" id="hp-monster"></div></div>
            <div class="name">Monster Kaku</div>
        </div>
    </div>

    <div class="question-area" id="q-area">
        <div class="q-number" id="q-num">SOAL 1 / 50</div>
        <div class="q-text" id="q-text">Memuat pertanyaan...</div>
        <div class="options" id="options-box"></div>
    </div>

    <div class="nav-area">
        <button class="nav-btn" onclick="prevSoal()">⬅️ KEMBALI</button>
        <button class="nav-btn serang" id="btn-serang" onclick="serang()">JAWAB! 🖌️</button>
    </div>

    <div class="modal" id="result-modal">
        <div class="modal-content">
            <div class="modal-title" id="m-title">SANGAT KREATIF!</div>
            <div style="font-size: 50px;" id="m-icon">🏆</div>
            <div class="modal-score" id="m-score">100</div>
            <p id="m-desc" style="font-weight:700;">Jiwa senimu sudah teruji dengan baik.</p>
            <a href="menu_pat.html" class="modal-btn">KEMBALI KE MENU 🗺️</a>
        </div>
    </div>

    <script>
        // Database 50 Soal SBdP Kelas 6
        const db = [
            ["Reklame yang memuat informasi peringatan, imbauan, atau ajakan kepada masyarakat disebut reklame...","A. Komersial","B. Nonkomersial (Layanan Masyarakat)","C. Promosi","D. Distribusi",1],
            ["Tujuan dari reklame komersial adalah...","A. Mengajak berbuat baik","B. Menawarkan barang agar laku terjual","C. Menyampaikan aturan pemerintah","D. Memberikan peringatan bahaya",1],
            ["Reklame visual yang ditempel di tembok atau tempat umum, biasanya berukuran besar dan berisi gambar serta tulisan disebut...","A. Brosur","B. Poster","C. Baliho","D. Embalase",1],
            ["Reklame yang terdapat pada kemasan sebuah produk atau barang disebut...","A. Embalase","B. Spanduk","C. Leaflet","D. Baliho",0],
            ["Ciri-ciri reklame yang baik adalah...","A. Kalimat panjang dan rumit","B. Warna kusam","C. Gambar menarik dan pesan jelas singkat","D. Sulit dibaca",2],
            ["Jarak antara nada satu ke nada yang lain dalam musik disebut...","A. Melodi","B. Interval Nada","C. Harmoni","D. Tempo",1],
            ["Alat musik yang tangga nadanya sudah pasti (seperti piano atau pianika) disebut alat musik...","A. Ritmis","B. Melodis","C. Dinamis","D. Harmonis",1],
            ["Interval nada dari C ke C (nada yang sama) memiliki jarak 0, interval ini disebut...","A. Prim","B. Sekon","C. Terts","D. Kuart",0],
            ["Interval nada berjarak 1 oktaf (contoh dari C rendah ke C tinggi) disebut interval...","A. Prim","B. Terts","C. Oktaf","D. Sekt",2],
            ["Tari yang dikembangkan dari tari tradisional dengan sentuhan unsur baru namun tidak menghilangkan nilai aslinya disebut...","A. Tari Klasik","B. Tari Primitif","C. Tari Kreasi Daerah","D. Tari Modern",2],
            ["Tari Remo adalah tari kreasi daerah yang sangat terkenal dan berasal dari provinsi...","A. Jawa Tengah","B. Jawa Timur","C. Bali","D. Sumatera Barat",1],
            ["Tari Remo biasanya difungsikan sebagai tarian untuk...","A. Meminta hujan","B. Menyambut tamu agung","C. Mengusir roh jahat","D. Merayakan panen",1],
            ["Pola lantai yang membentuk garis lurus dari depan ke belakang atau sebaliknya disebut pola lantai...","A. Horizontal","B. Vertikal","C. Melingkar","D. Diagonal",1],
            ["Pola lantai melingkar pada tari kecak dari Bali memberikan kesan...","A. Lemah lembut","B. Sedih","C. Kebersamaan dan magis/kuat","D. Lucu",2],
            ["Patung yang dibuat meniru bentuk-bentuk alam seperti manusia, hewan, dan tumbuhan disebut corak patung...","A. Realis / Figuratif","B. Abstrak","C. Deformatif","D. Geometris",0],
            ["Patung Liberty di Amerika Serikat merupakan contoh jenis patung...","A. Religi","B. Monumen","C. Arsitektur","D. Dekorasi",1],
            ["Bahan lunak yang sering digunakan untuk membuat model patung oleh siswa sekolah adalah...","A. Kayu Jati","B. Batu Marmer","C. Plastisin / Tanah Liat","D. Besi",2],
            ["Teknik membuat patung dari bahan tanah liat dengan cara memijat, menambah, dan mengurangi bahan disebut teknik...","A. Pahat","B. Butsir","C. Cor","D. Cetak",1],
            ["Jika kita ingin membuat patung dari kayu atau batu, teknik yang paling tepat digunakan adalah teknik...","A. Butsir","B. Pahat","C. Cor / Tuang","D. Cetak",1],
            ["Tari Kecak berasal dari...","A. Jawa Barat","B. Aceh","C. Bali","D. Papua",2],
            ["Tangga nada yang susunannya do-re-mi-fa-sol-la-si-do dengan jarak 1 - 1 - ½ - 1 - 1 - 1 - ½ disebut tangga nada...","A. Mayor","B. Minor","C. Pelog","D. Slendro",0],
            ["Ciri-ciri lagu dengan tangga nada mayor adalah...","A. Sedih dan syahdu","B. Lemah gemulai","C. Riang gembira dan bersemangat","D. Bertempo sangat lambat",2],
            ["Lagu 'Hari Merdeka' diciptakan oleh...","A. W.R. Supratman","B. H. Mutahar","C. Ibu Sud","D. Ismail Marzuki",1],
            ["Tari Saman dari Aceh sangat mengandalkan unsur...","A. Gerakan kaki yang lincah","B. Kekompakan gerakan tepuk tangan dan dada","C. Properti pedang","D. Selendang terbang",1],
            ["Pola lantai utama pada Tari Saman adalah...","A. Lingkaran","B. Zig-zag","C. Garis Lurus Horizontal","D. Garis Diagonal",2],
            ["Alat musik angklung berasal dari daerah...","A. Jawa Barat","B. Jawa Timur","C. Bali","D. Maluku",0],
            ["Cara memainkan alat musik angklung adalah dengan cara...","A. Ditiup","B. Dipetik","C. Digoyangkan","D. Dipukul",2],
            ["Patung dari bahan logam perunggu atau tembaga biasanya dibuat menggunakan teknik...","A. Butsir","B. Pahat","C. Cor / Cetak Tuang","D. Anyam",2],
            ["Poster yang bertujuan mencari pekerja atau menawarkan lowongan kerja disebut poster...","A. Niaga","B. Pendidikan","C. Layanan Masyarakat","D. Kampanye / Dicari",0], // Secara teknis masuk ke iklan/reklame, namun sering disebut poster niaga jasa.
            ["Brosur biasanya berbentuk...","A. Lembaran kain panjang","B. Buku tebal","C. Lembaran kertas yang dilipat","D. Papan besi",2],
            ["Tari Jejer Gandrung merupakan tari khas dari daerah kabupaten...","A. Surabaya","B. Malang","C. Banyuwangi","D. Mojokerto",2],
            ["Fungsi properti tari (seperti kipas, piring, atau selendang) adalah untuk...","A. Mempersulit penari","B. Memperindah tarian dan memperjelas makna gerakan","C. Menakut-nakuti penonton","D. Menyembunyikan wajah penari",1],
            ["Jarak nada dari C ke D disebut interval...","A. Prim","B. Sekon","C. Terts","D. Kuart",1],
            ["Jarak nada dari C ke E disebut interval...","A. Sekon","B. Terts","C. Kuart","D. Kuint",1],
            ["Seni membuat hiasan dari lipatan kertas (berasal dari Jepang) disebut...","A. Kirigami","B. Origami","C. Ikebana","D. Makrame",1],
            ["Bahan pewarna patung tanah liat yang sudah kering agar terlihat mengkilap dan indah biasanya menggunakan...","A. Cat Air","B. Cat Akrilik / Kayu","C. Krayon","D. Spidol",1],
            ["Ciri utama dari patung abstrak (nonfiguratif) adalah...","A. Bentuknya persis manusia","B. Susah dibedakan dengan foto","C. Bentuknya tidak menyerupai bentuk alami secara persis","D. Hanya bisa dibuat dari es",2],
            ["Batik merupakan warisan seni budaya Indonesia. Teknik membuat motif dengan meneteskan malam (lilin) panas menggunakan alat yang disebut...","A. Kuas","B. Canting","C. Palet","D. Spatula",1],
            ["Seni membatik paling terkenal di Pulau Jawa berkembang di kota...","A. Jakarta dan Bandung","B. Solo dan Yogyakarta","C. Surabaya dan Malang","D. Banyuwangi dan Jember",1],
            ["Lagu daerah 'Gundul-Gundul Pacul' berasal dari...","A. Jawa Tengah","B. Jawa Barat","C. Jawa Timur","D. Bali",0],
            ["Reklame berjalan yang dipasang pada badan bus atau mobil disebut...","A. Baliho","B. Spanduk","C. Mobile Billboard (Reklame Berjalan)","D. Neon Box",2],
            ["Dalam bernyanyi, tinggi rendahnya nada harus tepat. Hal ini disebut...","A. Artikulasi","B. Pitch / Intonasi","C. Pernapasan","D. Phrasering",1],
            ["Tari Piring merupakan tarian tradisional yang berasal dari daerah...","A. Minangkabau (Sumatera Barat)","B. Batak (Sumatera Utara)","C. Dayak (Kalimantan)","D. Bugis (Sulawesi Selatan)",0],
            ["Papan nama toko yang bisa menyala di malam hari karena ada lampu di dalamnya disebut...","A. Spanduk","B. Embalase","C. Neon Box","D. Leaflet",2],
            ["Gerakan tari yang meniru aktivitas hewan, seperti burung merak, termasuk gerakan...","A. Maknawi","B. Murni","C. Imitatif / Peniruan","D. Abstrak",2],
            ["Tari Jaipong sangat dinamis dan iringannya didominasi oleh suara alat musik...","A. Gendang (Kendang)","B. Seruling","C. Biola","D. Piano",0],
            ["Pameran karya seni patung di sekolah bertujuan untuk...","A. Mencari keuntungan uang sebanyak-banyaknya","B. Menghargai dan mengapresiasi hasil karya siswa","C. Mengotori lingkungan sekolah","D. Syarat lulus ujian akhir saja",1],
            ["Cepat lambatnya sebuah lagu dinyanyikan disebut...","A. Melodi","B. Harmoni","C. Tempo","D. Dinamika",2],
            ["Patung monumen Monas (Monumen Nasional) terletak di kota...","A. Surabaya","B. Bandung","C. Yogyakarta","D. Jakarta",3],
            ["Lagu yang dinyanyikan oleh lebih dari 3 orang dengan pembagian suara yang berbeda-beda disebut...","A. Solo","B. Duet","C. Paduan Suara (Koor)","D. Trio",2]
        ];

        let currQ = 0;
        let answers = new Array(50).fill(null);
        let hpMonster = 100;

        const qNum = document.getElementById('q-num');
        const qText = document.getElementById('q-text');
        const optBox = document.getElementById('options-box');
        const btnSerang = document.getElementById('btn-serang');
        const barMonster = document.getElementById('hp-monster');

        function loadQ() {
            qNum.innerText = `KARYA ${currQ + 1} / 50`;
            qText.innerText = db[currQ][0];
            optBox.innerHTML = '';
            
            for(let i=1; i<=4; i++) {
                let btn = document.createElement('button');
                btn.className = 'opt-btn';
                if(answers[currQ] === i-1) btn.classList.add('selected');
                btn.innerText = db[currQ][i];
                btn.onclick = () => { answers[currQ] = i-1; loadQ(); };
                optBox.appendChild(btn);
            }

            if(currQ === 49) {
                btnSerang.innerText = "KUMPULKAN! 🔒";
                btnSerang.style.background = "#c0392b";
            } else {
                btnSerang.innerText = "JAWAB! 🖌️";
                btnSerang.style.background = "#8e44ad";
            }
        }

        function prevSoal() { if(currQ > 0) { currQ--; loadQ(); } }

        function serang() {
            if(answers[currQ] === null) {
                alert("Jangan tinggalkan kanvas kosong, pelukis!");
                return;
            }

            if(answers[currQ] === db[currQ][5]) {
                hpMonster = Math.max(0, hpMonster - 2); 
                barMonster.style.width = hpMonster + "%";
            } else {
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 300);
            }

            if(currQ < 49) { currQ++; loadQ(); } 
            else { tamat(); }
        }

        function tamat() {
            let skor = 0;
            answers.forEach((ans, i) => { if(ans === db[i][5]) skor += 2; });
            
            document.getElementById('m-score').innerText = skor;
            let title = document.getElementById('m-title');
            let desc = document.getElementById('m-desc');
            let icon = document.getElementById('m-icon');

            if(skor >= 80) {
                title.innerText = "LULUS DENGAN INDAH!";
                title.style.color = "#8e44ad";
                icon.innerText = "🎨✨";
                desc.innerText = "Kamu adalah Seniman sejati. Siap pameran!";
            } else {
                title.innerText = "SEDIKIT KAKU";
                title.style.color = "#e74c3c";
                icon.innerText = "🗿";
                desc.innerText = "Nilaimu belum maksimal. Ayo asah terus kreativitasmu!";
                document.getElementById('hp-player').style.width = "10%";
            }
            
            document.getElementById('result-modal').style.display = "flex";
        }

        loadQ();
    </script>
</body>
</html>
